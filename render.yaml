# Render.com deployment config
services:
  - type: web
    name: oak-bidding-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: CLOUD_MODE
        value: "1"
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.3"
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
